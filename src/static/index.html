<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20 Newsgroups Semantic Search</title>
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafafa;
            color: #171717;
        }

        .search-container {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* When search is active, moves up gracefully */
        .search-active {
            transform: translateY(-8vh);
        }

        .search-box {
            background: #ffffff;
            border: 1px solid #e5e5e5;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border-color: #d4d4d4;
        }

        .result-card {
            background: #ffffff;
            border: 1px solid #eaeaea;
            transition: all 0.2s ease;
        }

        .result-card:hover {
            border-color: #000000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .badge {
            background: #f5f5f5;
            border: 1px solid #e5e5e5;
            color: #525252;
        }

        .badge-match {
            background: #ecfdf5;
            border: 1px solid #10b981;
            color: #059669;
        }

        .text-truncate {
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Loading spinner */
        .spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #000000;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="min-h-screen relative flex flex-col pt-[20vh] selection:bg-black selection:text-white">

    <div id="mainContainer" class="search-container max-w-3xl w-full mx-auto px-6 relative z-10">

        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-semibold mb-3 tracking-tight text-black">
                Semantic Intranet
            </h1>
            <p class="text-neutral-500 text-sm max-w-xl mx-auto">
                Search the 20 Newsgroups corpus. Natural language intent matching powered by ChromaDB, Sentence
                Transformers, and a custom cluster-aware caching engine.
            </p>
        </div>

        <!-- Search Input -->
        <div class="search-box p-1.5 pl-5 rounded-[2rem] flex items-center mb-4 text-lg w-full">
            <svg class="w-5 h-5 text-neutral-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" id="searchInput"
                class="flex-1 bg-transparent border-none outline-none text-black placeholder-neutral-400 py-2.5 font-light"
                placeholder="Ask anything..." onkeydown="if(event.key === 'Enter') performSearch()">
            <button onclick="performSearch()" id="searchBtn"
                class="bg-black hover:bg-neutral-800 text-white transition px-6 py-2.5 rounded-full font-medium text-sm flex items-center gap-2">
                <span>Search</span>
            </button>
        </div>

        <!-- Meta Telemetry Line -->
        <div class="flex justify-between items-center text-xs px-2 h-6">
            <div id="statusText" class="text-neutral-400 flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 rounded-full bg-neutral-300"></span> Ready
            </div>
            <div class="flex gap-3 font-mono">
                <span id="cacheHitStat"
                    class="hidden px-2 rounded-sm bg-black text-white py-0.5 tracking-wider font-semibold shadow-sm">⚡
                    CACHE HIT</span>
                <span id="timeStat" class="text-neutral-500 tracking-tight"></span>
            </div>
        </div>

        <!-- Formatted Structure Results Area -->
        <div id="resultsContainer" class="space-y-4 mt-8 hidden pb-20">
            <!-- JS inserts beautiful cards here -->
        </div>

    </div>

    <script>
        async function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            // Trigger animation moving search bar up
            document.getElementById('mainContainer').classList.add('search-active');

            const btn = document.getElementById('searchBtn');
            const container = document.getElementById('resultsContainer');
            const status = document.getElementById('statusText');
            const timeStat = document.getElementById('timeStat');
            const cacheStat = document.getElementById('cacheHitStat');

            btn.innerHTML = `<div class="spinner"></div><span class="ml-1 opacity-80">Searching</span>`;
            btn.classList.add('pointer-events-none', 'opacity-90');

            status.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-black animate-pulse"></span> Scanning vector space...`;
            timeStat.innerText = "";
            cacheStat.classList.add('hidden');
            container.innerHTML = "";
            container.classList.add('hidden');

            const start = performance.now();

            try {
                const res = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, n_results: 5 })
                });

                if (!res.ok) throw new Error(res.statusText);
                const data = await res.json();
                const latency = parseInt(performance.now() - start);

                timeStat.innerText = `${latency}ms`;
                if (data.cache_hit) {
                    cacheStat.classList.remove('hidden');
                    status.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> Retrieved from memory: Cluster ${data.dominant_cluster}`;
                } else {
                    status.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span> Live execution: Bucketed to Cluster ${data.dominant_cluster}`;
                }

                container.classList.remove('hidden');

                if (data.result && data.result.length > 0) {
                    container.innerHTML = data.result.map((r, i) => `
                        <div class="result-card p-6 rounded-xl relative group">
                            
                            <div class="flex justify-between items-center mb-3">
                                <span class="badge px-2.5 py-1 rounded-md text-[11px] font-semibold uppercase tracking-widest">
                                    ${r.category}
                                </span>
                                <div class="badge-match px-2 py-0.5 rounded text-xs font-medium flex items-center gap-1">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                                    ${(r.similarity * 100).toFixed(1)}% Match
                                </div>
                            </div>
                            <!-- Minimalist quote line -->
                            <div class="pl-4 border-l-2 border-neutral-200 group-hover:border-black transition-colors">
                                <p class="text-neutral-600 leading-relaxed text-[15px] font-light text-truncate">"${r.text.replace(/\n/g, '<br>')}"</p>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = `<div class="text-center py-12 text-neutral-400 border border-dashed border-neutral-200 rounded-xl text-sm">No semantic matches found for this query.</div>`;
                }

            } catch (err) {
                status.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> Network Error: ${err.message}`;
            } finally {
                btn.innerHTML = `<span>Search</span>`;
                btn.classList.remove('pointer-events-none', 'opacity-90');
            }
        }
    </script>
</body>

</html>
