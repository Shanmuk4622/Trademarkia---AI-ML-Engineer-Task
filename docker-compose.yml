version: "3.9"

services:
  semantic-search:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trademarkia_semantic_search
    ports:
      - "8000:8000"
    volumes:
      # Mount the data directories so the container uses pre-built indices
      # without baking them into the image (they can be large)
      - ./embeddings:/app/embeddings
      - ./clusters:/app/clusters
      - ./cache:/app/cache
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
